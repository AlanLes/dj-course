server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: jesli plik nie istnieje, zwroc index.html
    # (React Router sam obsluzy route po stronie przegladarki)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache dla statkych assetow: JS/CSS maja unikalne hashe w nazwie
    # (np. main.a1b2c3d4.js), wiec mozna je cachowac w przegladarce na rok
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}