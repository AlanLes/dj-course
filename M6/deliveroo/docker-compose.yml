services:
  # ============ PostgreSQL (2 databases: wms, tms) ============
  postgres:
    image: postgres:17-alpine
    container_name: wms-postgres-container
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-wms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - deliveroo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d wms"]
      interval: 2s
      timeout: 5s
      retries: 5

  # ============ MongoDB (customer-portal) ============
  mongodb:
    image: mongo:7
    container_name: deliveroo-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/cp/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    networks:
      - deliveroo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ mongo-express (MongoDB UI) ============
  # mongo-express to gotowa webówka do przeglądania kolekcji MongoDB w przeglądarce.
  # Używamy oficjalnego obrazu – nie trzeba pisać Dockerfile.
  # Będzie dostępny pod: http://localhost:8081
  mongo-express:
    image: mongo-express:1.0
    container_name: deliveroo-mongo-express
    ports:
      - "8081:8081"
    environment:
      # Adres serwera MongoDB – tu podajemy NAZWĘ SERWISU z docker-compose, nie IP.
      # Docker rozwiązuje tę nazwę automatycznie w obrębie sieci deliveroo-network.
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      # Dane logowania do samego interfejsu mongo-express (chronią UI hasłem)
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD:-admin}
    networks:
      - deliveroo-network
    # depends_on z condition: service_healthy oznacza:
    # "nie startuj mnie dopóki mongodb nie przejdzie healthchecku"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ============ Redis (cache) ============
  # Redis to baza klucz-wartość działająca w pamięci RAM – błyskawicznie szybka.
  # Używamy jej do cachowania wyników GET /invoices.
  redis:
    image: redis:7-alpine
    container_name: deliveroo-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      # Wolumin sprawia, że dane przeżywają restart kontenera (domyślnie Redis
      # trzyma wszystko w RAM – po restarcie znika; z woluminem jest persystowany).
      - redis_data:/data
    networks:
      - deliveroo-network
    restart: unless-stopped
    healthcheck:
      # 'redis-cli ping' zwraca "PONG" jeśli Redis żyje
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============ invoices-api (Node.js/TS/Express) ============
  # Nasz własny serwis – budowany z lokalnego Dockerfile w katalogu ./invoices-api.
  # Udostępnia 2 endpointy: GET /invoices i POST /invoices.
  invoices-api:
    container_name: invoices-api
    # 'build:' zamiast 'image:' – Docker sam zbuduje obraz z Dockerfile
    build:
      context: ./invoices-api  # katalog z Dockerfile i kodem
      dockerfile: Dockerfile
    ports:
      - "${INVOICES_API_PORT:-3100}:3100"
    environment:
      PORT: 3100
      # URI do MongoDB – format: mongodb://user:pass@host:port/baza?authSource=admin
      # 'mongodb' w adresie = nazwa serwisu z docker-compose (nie localhost!)
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/invoices?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - deliveroo-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============ WMS ============
  wms-api:
    container_name: wms-api
    build:
      context: ./wms-api
      dockerfile: Dockerfile
    environment:
      PORT: ${WMS_API_PORT:-3001}
      SERVICE_NAME: wms-api
      POSTGRES_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-strongpassword123}@postgres:5432/wms
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:4201}
    ports:
      - "${WMS_API_PORT:-3001}:3001"
    networks:
      - deliveroo-network
    depends_on:
      postgres:
        condition: service_healthy

  wms-frontend:
    container_name: wms-frontend
    build:
      context: ./wms-frontend
      dockerfile: Dockerfile
      target: development
    environment:
      API_URL: http://localhost:${WMS_API_PORT:-3001}
    ports:
      - "${WMS_FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./wms-frontend:/app
      - /app/node_modules
    networks:
      - deliveroo-network
    depends_on:
      - wms-api

  # ============ TMS ============
  tms-api:
    container_name: tms-api
    build:
      context: ./tms-api
      dockerfile: Dockerfile
    environment:
      PORT: ${TMS_API_PORT:-3030}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000}
    ports:
      - "${TMS_API_PORT:-3030}:3030"
    networks:
      - deliveroo-network

  tms-frontend:
    container_name: tms-frontend
    build:
      context: ./tms-frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "${TMS_FRONTEND_PORT:-8080}:8080"
    networks:
      - deliveroo-network
    depends_on:
      - tms-api

  # ============ Customer Portal ============
  customer-portal:
    container_name: customer-portal
    build:
      context: ./customer-portal
      dockerfile: Dockerfile
      target: development
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:${CUSTOMER_PORTAL_PORT:-3000}
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/cp-db?authSource=admin
    ports:
      - "${CUSTOMER_PORTAL_PORT:-3000}:3000"
    volumes:
      - ./customer-portal:/app
      - /app/node_modules
    networks:
      - deliveroo-network
    depends_on:
      mongodb:
        condition: service_healthy

  # ============ pgAdmin (optional) ============
  pgadmin:
    image: dpage/pgadmin4:9.4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_password}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - deliveroo-network
    depends_on:
      - postgres
    restart: unless-stopped

  # ============ Docker Registry ============
  registry:
    image: registry:2
    container_name: deliveroo-registry
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    networks:
      - deliveroo-network
    restart: unless-stopped

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: deliveroo-registry-ui
    ports:
      - "8080:80"
    environment:
      REGISTRY_TITLE: "Deliveroo Registry"
      NGINX_PROXY_PASS_URL: http://registry:5000
      SINGLE_REGISTRY: "true"
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
    networks:
      - deliveroo-network
    depends_on:
      - registry
    restart: unless-stopped


networks:
  deliveroo-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  pgadmin_data:
  registry_data:
  redis_data:
